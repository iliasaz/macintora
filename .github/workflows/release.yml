name: Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach the DMG to"
        required: true
        type: string

env:
  SCHEME: Macintora
  PROJECT: Macintora.xcodeproj
  APP_NAME: Macintora

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-26

    steps:
      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ inputs.tag }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $TAG"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Clone sibling SPM dependencies
        # The Xcode project references these as relative paths
        # (../STTextView, ../STTextView-Plugin-Neon, ../STTextKitPlus),
        # so they must live next to the checkout directory.
        run: |
          git clone --depth 1 https://github.com/iliasaz/STTextView.git ../STTextView
          git clone --depth 1 https://github.com/iliasaz/STTextView-Plugin-Neon.git ../STTextView-Plugin-Neon
          git clone --depth 1 https://github.com/iliasaz/STTextKitPlus.git ../STTextKitPlus
          ls -la ..

      - name: List available Xcode versions
        run: ls -d /Applications/Xcode*.app

      - name: Select Xcode (latest available)
        run: |
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$LATEST_XCODE" ]; then
            echo "Using $LATEST_XCODE"
            sudo xcode-select -s "$LATEST_XCODE"
          else
            echo "No Xcode found!"
            exit 1
          fi

      - name: Show Xcode and Swift version
        run: |
          xcodebuild -version
          swift --version

      - name: Configure Xcode for CI (skip macro validation)
        run: |
          defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES
          defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidation -bool YES

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'platform=macOS' \
            -archivePath "$RUNNER_TEMP/$APP_NAME.xcarchive" \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Export Archive
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>mac-application</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/$APP_NAME.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Prepare App Bundle
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/export" -name "*.app" -type d | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "Error: No .app bundle found in export directory"
            ls -la "$RUNNER_TEMP/export"
            exit 1
          fi

          echo "Found app at: $APP_PATH"
          cp -R "$APP_PATH" "$GITHUB_WORKSPACE/$APP_NAME.app"
          echo "APP_PATH=$GITHUB_WORKSPACE/$APP_NAME.app" >> $GITHUB_ENV

      - name: Create DMG
        run: |
          DMG_NAME="${APP_NAME}-${{ steps.tag.outputs.tag }}"
          hdiutil create -volname "$APP_NAME" \
            -srcfolder "$APP_PATH" \
            -ov -format UDZO \
            "${DMG_NAME}.dmg"

          echo "DMG created:"
          ls -lh "${DMG_NAME}.dmg"
          echo "DMG_PATH=${DMG_NAME}.dmg" >> $GITHUB_ENV

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            *.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
