name: Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (leave empty to auto-bump from latest release, e.g. 0.11 → 0.12)"
        required: false
        type: string

env:
  SCHEME: Macintora
  PROJECT: Macintora.xcodeproj
  APP_NAME: Macintora
  BUNDLE_ID: com.iliasazonov.macintora

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-26

    steps:
      - name: Resolve release tag
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            # Tag already exists at this SHA; check it out.
            CHECKOUT_REF="$TAG"
          elif [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
            CHECKOUT_REF=""   # leave empty: use the dispatch branch
          else
            # Auto-bump: take the latest release tag, increment the trailing number.
            LATEST=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 1 \
                     --json tagName --jq '.[0].tagName')
            if [ -z "$LATEST" ]; then
              TAG="0.1"
            else
              MAJOR="${LATEST%.*}"
              MINOR="${LATEST##*.}"
              if ! [[ "$MINOR" =~ ^[0-9]+$ ]]; then
                echo "::error::Latest tag '$LATEST' does not end in a numeric component; cannot auto-bump."
                exit 1
              fi
              TAG="${MAJOR}.$((MINOR + 1))"
            fi
            CHECKOUT_REF=""
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$CHECKOUT_REF" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $TAG (checkout ref: '${CHECKOUT_REF:-<dispatch branch>}')"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.checkout_ref }}

      - name: Clone sibling SPM dependencies
        # The Xcode project references these as relative paths
        # (../STTextView, ../STTextView-Plugin-Neon, ../STTextKitPlus),
        # so they must live next to the checkout directory.
        run: |
          git clone --depth 1 https://github.com/iliasaz/STTextView.git ../STTextView
          git clone --depth 1 https://github.com/iliasaz/STTextView-Plugin-Neon.git ../STTextView-Plugin-Neon
          git clone --depth 1 https://github.com/iliasaz/STTextKitPlus.git ../STTextKitPlus
          ls -la ..

      - name: Select Xcode (latest available)
        run: |
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$LATEST_XCODE" ]; then
            echo "Using $LATEST_XCODE"
            sudo xcode-select -s "$LATEST_XCODE"
          else
            echo "No Xcode found!"
            exit 1
          fi

      - name: Show Xcode and Swift version
        run: |
          xcodebuild -version
          swift --version

      - name: Configure Xcode for CI (skip macro validation)
        run: |
          defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES
          defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidation -bool YES

      - name: Import Developer ID Application certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.DEVELOPER_ID_APPLICATION_CERT_BASE64 }}
          p12-password: ${{ secrets.DEVELOPER_ID_APPLICATION_CERT_PASSWORD }}

      - name: Stage App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          # notarytool can authenticate either by stored profile or by passing
          # --key/--key-id/--issuer directly. We stage the .p8 on disk so the
          # later notarize step can reference it by path.
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          printf '%s' "$APP_STORE_CONNECT_API_KEY" > "$KEY_PATH"
          echo "ASC_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Build Archive (Developer ID signed)
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          # Stamp the release tag as the user-visible MARKETING_VERSION and as
          # CFBundleVersion. The project's pbxproj has MARKETING_VERSION=1.0
          # hardcoded, which doesn't match the actual 0.x release tags — these
          # overrides keep the About box honest without editing the project file.
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'platform=macOS' \
            -archivePath "$RUNNER_TEMP/$APP_NAME.xcarchive" \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options=runtime" \
            MARKETING_VERSION="$TAG" \
            CURRENT_PROJECT_VERSION="$TAG" \
            ONLY_ACTIVE_ARCH=NO

      - name: Export Archive (developer-id)
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Developer ID Application</string>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/$APP_NAME.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export"

      - name: Locate exported app
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/export" -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: No .app bundle found in export directory"
            ls -la "$RUNNER_TEMP/export"
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          cp -R "$APP_PATH" "$GITHUB_WORKSPACE/$APP_NAME.app"
          echo "APP_PATH=$GITHUB_WORKSPACE/$APP_NAME.app" >> "$GITHUB_ENV"

      - name: Verify code signature
        run: |
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign --display --verbose=4 "$APP_PATH" | sed -n '1,20p'

      - name: Notarize app
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          # notarytool requires the submission to be a zip, pkg, or dmg.
          # Zip the .app first, submit, wait, then staple the original .app.
          ZIP_PATH="$RUNNER_TEMP/${APP_NAME}.zip"
          /usr/bin/ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"

          xcrun notarytool submit "$ZIP_PATH" \
            --key "$ASC_KEY_PATH" \
            --key-id "$ASC_KEY_ID" \
            --issuer "$ASC_ISSUER_ID" \
            --wait

          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          spctl --assess --type execute --verbose=4 "$APP_PATH" || true

      - name: Create DMG
        run: |
          DMG_NAME="${APP_NAME}-${{ steps.tag.outputs.tag }}"
          # Stage only the .app so the DMG window doesn't show stray files.
          STAGING="$RUNNER_TEMP/dmg-staging"
          rm -rf "$STAGING"
          mkdir -p "$STAGING"
          cp -R "$APP_PATH" "$STAGING/"

          hdiutil create -volname "$APP_NAME" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "${DMG_NAME}.dmg"

          echo "DMG_PATH=${DMG_NAME}.dmg" >> "$GITHUB_ENV"
          ls -lh "${DMG_NAME}.dmg"

      - name: Sign, notarize, and staple DMG
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          codesign --sign "Developer ID Application" \
            --timestamp \
            --options runtime \
            "$DMG_PATH"

          xcrun notarytool submit "$DMG_PATH" \
            --key "$ASC_KEY_PATH" \
            --key-id "$ASC_KEY_ID" \
            --issuer "$ASC_ISSUER_ID" \
            --wait

          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"
          spctl --assess --type open --context context:primary-signature --verbose=4 "$DMG_PATH" || true

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            *.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
